apiVersion: apps/v1
kind: Deployment
metadata:
  name: finops-api
  labels:
    app: finops-api
    environment: staging
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: finops-api
      environment: staging
  template:
    metadata:
      labels:
        app: finops-api
        environment: staging
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: monolith
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: PG_DSN
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: JWT_SECRET
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.existingConfigMap }}
                  key: ENVIRONMENT
            - name: AUTO_MIGRATE
              value: "true"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 30
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
